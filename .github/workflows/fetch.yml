name: Fetch conflict news

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:          # manual trigger button in GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch news from NewsAPI
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          FROM=$(date -u -d '2 days ago' +%Y-%m-%d)
          TODAY=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          fetch_query() {
            local QUERY="$1"
            curl -sf "https://newsapi.org/v2/everything?q=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$QUERY'))")&language=en&sortBy=publishedAt&pageSize=10&from=${FROM}&apiKey=${NEWS_API_KEY}" || echo '{"articles":[]}'
          }

          IRAN=$(fetch_query "Iran war Israel US strikes military")
          UKRAINE=$(fetch_query "Ukraine Russia war NATO military")
          LEBANON=$(fetch_query "Lebanon Hezbollah Israel strikes")
          TAIWAN=$(fetch_query "Taiwan China military strait PLA")
          KOREA=$(fetch_query "North Korea nuclear Kim Jong Un")
          NUCLEAR=$(fetch_query "nuclear weapons war threat proliferation")

          python3 - <<PYEOF
          import json, sys, datetime

          def load(raw):
              try:
                  d = json.loads(raw)
                  return d.get("articles", [])
              except:
                  return []

          iran    = load("""$IRAN""")
          ukraine = load("""$UKRAINE""")
          lebanon = load("""$LEBANON""")
          taiwan  = load("""$TAIWAN""")
          korea   = load("""$KOREA""")
          nuclear = load("""$NUCLEAR""")

          for a in iran:    a["_cat"] = "iran";    a["_label"] = "Iran War"
          for a in ukraine: a["_cat"] = "ukraine"; a["_label"] = "Ukraine"
          for a in lebanon: a["_cat"] = "lebanon"; a["_label"] = "Lebanon"
          for a in taiwan:  a["_cat"] = "taiwan";  a["_label"] = "Taiwan"
          for a in korea:   a["_cat"] = "korea";   a["_label"] = "N. Korea"
          for a in nuclear: a["_cat"] = "nuclear"; a["_label"] = "Nuclear"

          all_articles = iran + ukraine + lebanon + taiwan + korea + nuclear

          # Deduplicate by URL
          seen = set()
          deduped = []
          for a in all_articles:
              url = a.get("url", "")
              if url and url not in seen:
                  seen.add(url)
                  # Keep only fields we need to keep data.json lean
                  deduped.append({
                      "title":       a.get("title", ""),
                      "url":         a.get("url", ""),
                      "source":      a.get("source", {}).get("name", ""),
                      "publishedAt": a.get("publishedAt", ""),
                      "_cat":        a.get("_cat", ""),
                      "_label":      a.get("_label", "")
                  })

          # Sort newest first
          deduped.sort(key=lambda x: x.get("publishedAt", ""), reverse=True)

          output = {
              "updated": "$TODAY",
              "count": len(deduped),
              "articles": deduped
          }

          with open("data.json", "w") as f:
              json.dump(output, f, ensure_ascii=False)

          print(f"Wrote {len(deduped)} articles to data.json")
          PYEOF

      - name: Commit data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update news data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
